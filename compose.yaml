services:
  mongo:
    image: mongo:8.0
    ports: ["27017:27017"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${KIT_RENTAL_SQL_PASSWORD:-KitRental_Local_2026!}
    ports: ["1433:1433"]
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '$$MSSQL_SA_PASSWORD' -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  identity:
    build:
      context: .
      dockerfile: KitRental.Identity/src/KitRental.Identity.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Security__TokenSecret: ${KIT_RENTAL_TOKEN_SECRET:-development-only-secret-change-before-production-2026}
      Mongo__ConnectionString: mongodb://mongo:27017
      Mongo__Database: KitRentalIdentity
    ports: ["5101:8080"]
    depends_on:
      mongo:
        condition: service_healthy

  core:
    build:
      context: .
      dockerfile: KitRental.Core/src/KitRental.Core.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Security__TokenSecret: ${KIT_RENTAL_TOKEN_SECRET:-development-only-secret-change-before-production-2026}
      ConnectionStrings__CoreDatabase: Server=mssql,1433;Database=KitRentalCore;User Id=sa;Password=${KIT_RENTAL_SQL_PASSWORD:-KitRental_Local_2026!};TrustServerCertificate=True
    ports: ["5102:8080"]
    depends_on:
      mssql:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: KitRental.Gateway/src/KitRental.ApiGateway/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Services__Identity: http://identity:8080
      Services__Core: http://core:8080
    ports: ["5100:8080"]
    depends_on: [identity, core]

  web:
    build:
      context: .
      dockerfile: KitRental.Web/src/KitRental.Web.Mvc/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      GatewayUrl: http://gateway:8080
    ports: ["5200:8080"]
    depends_on: [gateway]

volumes:
  mongo-data:
  mssql-data:
